decisions:
  worker_naming: "Worker roles are stable backend capability ids; workerDisplayName is user-defined display data. Do not hard-code personal names into runtime modules, events, sandbox labels, or run decisions."
  runtime_spine: "Use generic agent_runs, agent_run_events, agent_run_artifacts, agent_run_sandboxes"
  review_run_role: "Legacy/manual compatibility only; not the proof source of truth"
  flue_shape: "Code review worker PR reviews run as a real Flue workflow where possible"
  ui_surface: "Minimal backend/API run list and run events; no UI design work"
  sandbox_plane: "Daytona only for agent execution; Docker/Dokploy only deploys services"
  completion_proof: "Real GitHub PR webhook through Smee, not fixtures/direct calls"

tasks:
  - id: inspect-current-slice2
    title: Read current uncommitted Slice 2 and preserve useful work
    status: done
    proves: "We build on existing webhook/worker/Daytona code without blindly rewriting"

  - id: reread-flue-docs
    title: Re-read Flue workflow, observability, events, Daytona, GitHub channel, skills/subagents docs
    status: done
    proves: "Runner uses official Flue extension points"

  - id: add-generic-run-spine
    title: Add agent_runs, agent_run_events, agent_run_artifacts, agent_run_sandboxes schema and migrations
    status: done
    proves: "Run/event model is product-generic, not review_run-specific"

  - id: webhook-to-agent-run
    title: Make verified GitHub PR webhook admission create queued agent_run and initial events
    status: done
    proves: "Real webhook creates durable queued run"

  - id: worker-claim-heartbeat
    title: Worker claims queued agent_runs, writes stage and heartbeat events
    status: done
    proves: "Run progress survives outside terminal logs"

  - id: daytona-lifecycle-events
    title: Persist Daytona create/start/delete/failure lifecycle and sandboxId immediately after creation
    status: done
    proves: "Sandbox lifecycle is durable and cleanup-auditable"

  - id: flue-event-capture
    title: Persist official Flue/log/model/tool/result events or closest available stream into agent_run_events
    status: done
    proves: "UI can see model/tool/result progress durably"

  - id: stale-run-recovery
    title: Recover stale running runs and clean Daytona sandboxes by labels
    status: done
    proves: "Interrupted workers do not leave stuck runs or orphaned sandboxes"

  - id: flue-github-review-tools
    title: Add Flue-native GitHub review tools for the code review worker
    status: done
    proves: "The agent posts the start comment, PR review, and check run through bounded app-owned Flue tools"

  - id: minimal-run-api
    title: Add minimal API to list runs and fetch run events for UI worktree
    status: done
    proves: "Dashboard/API can consume durable run state"

  - id: deterministic-proof-loop
    title: Add Smee real-PR local proof runbook/script without synthetic payload success claims
    status: done
    proves: "Operator can repeat the real end-to-end proof"

  - id: key-preflight-guard
    title: Add local preflight so unreadable GitHub App private key is caught before consuming a webhook
    status: done
    proves: "Next real PR attempt waits for app-token readiness instead of failing after queue claim"

  - id: verification
